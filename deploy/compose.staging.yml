# Staging environment override
# Usage: podman compose -f compose.yml -f compose.staging.yml up -d

services:
  scheduler:
    environment:
      - TZ=Asia/Shanghai
      - PYTHONLOGFORMAT=text
      - LOG_LEVEL=DEBUG
      - SCHEDULE_HOUR=${SCHEDULE_HOUR:-7}
      - SCHEDULE_MIN=${SCHEDULE_MIN:-30}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
