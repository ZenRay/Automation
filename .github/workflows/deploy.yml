name: Deploy - Build, Scan & Push

on:
  push:
    branches: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zenray/automation

permissions:
  packages: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install black flake8

      - name: Black format check
        run: black --check .

      - name: Flake8 lint
        run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run unit tests (skip integration)
        run: pytest tests/ -v -m "not integration" --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: automation:${{ github.sha }}

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: automation:${{ github.sha }}
          scanners: secret
          exit-code: "1"

      - name: Verify no credential files in image
        run: |
          RESULT=$(docker run --rm automation:${{ github.sha }} find /app -name "*.ini" -o -name ".env")
          if [ -n "$RESULT" ]; then
            echo "FAIL: Credential files found in image:"
            echo "$RESULT"
            exit 1
          fi
          echo "PASS: No credential files found"

  push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: push
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            CONFIG_DIR="${CONFIG_DIR:-/opt/automation/config}"
            IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取新镜像（重试 3 次）
            for i in 1 2 3; do
              if podman pull "$IMAGE"; then
                break
              fi
              echo "[deploy] Pull attempt $i failed, retrying in 10s..."
              sleep 10
            done

            # 停止并移除旧容器
            podman rm -f automation-worker 2>/dev/null || true
            podman rm -f automation-scheduler 2>/dev/null || true

            # 启动 worker 容器
            podman run -d \
              --name automation-worker \
              --restart unless-stopped \
              --cpus 4.0 --memory 8g \
              -e TZ=Asia/Shanghai \
              -e PYTHONLOGFORMAT=text \
              -e LOG_LEVEL=INFO \
              -v "${CONFIG_DIR}/_lark.ini:/app/automation/conf/_lark.ini:ro" \
              -v "${CONFIG_DIR}/_maxcomputer.ini:/app/automation/conf/_maxcomputer.ini:ro" \
              "$IMAGE" \
              bash /app/workers/cron_task.sh

            # 启动 scheduler 容器
            podman run -d \
              --name automation-scheduler \
              --restart always \
              -e TZ=Asia/Shanghai \
              -e PYTHONLOGFORMAT=text \
              -e LOG_LEVEL=INFO \
              -e SCHEDULE_HOUR=8 \
              -e SCHEDULE_MIN=20 \
              -v "${CONFIG_DIR}/_lark.ini:/app/automation/conf/_lark.ini:ro" \
              -v "${CONFIG_DIR}/_maxcomputer.ini:/app/automation/conf/_maxcomputer.ini:ro" \
              "$IMAGE" \
              bash /app/deploy/scripts/scheduler.sh

            # 清理旧镜像
            podman image prune -f || true

            echo "[deploy] Deployment complete: $IMAGE"
