name: Deploy - Build, Scan & Push

on:
  workflow_run:
    workflows: ["CI - Lint & Test"]
    types: [completed]
    branches: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zenray/automation

permissions:
  packages: write
  contents: read

jobs:
  build:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'staging' || github.event.workflow_run.head_branch == 'production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: automation:${{ github.event.workflow_run.head_sha }}

      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: automation:${{ github.event.workflow_run.head_sha }}
          scanners: secret
          exit-code: "1"

      - name: Verify no credential files in image
        run: |
          RESULT=$(docker run --rm automation:${{ github.event.workflow_run.head_sha }} find /app -name "*.ini" -o -name ".env")
          if [ -n "$RESULT" ]; then
            echo "FAIL: Credential files found in image:"
            echo "$RESULT"
            exit 1
          fi
          echo "PASS: No credential files found"

  push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=${{ github.event.workflow_run.head_branch }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  smoke:
    needs: push
    if: github.event.workflow_run.head_branch == 'production' && needs.push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and smoke test
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" python --version
          docker run --rm "$IMAGE" bash -c "test -d /app/automation && test -d /app/workers && echo 'Smoke test PASSED'"

  deploy:
    needs: smoke
    if: github.event.workflow_run.head_branch == 'production' && needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_DIR="${DEPLOY_DIR:-/opt/automation/deploy}"
            CONFIG_DIR="${CONFIG_DIR:-/opt/automation/config}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.event.workflow_run.head_sha }}"

            echo "[deploy] Image: $IMAGE"
            echo "[deploy] Deploy dir: $DEPLOY_DIR"

            # 登录 GHCR 拉取镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null \
              || echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取新镜像
            docker pull "$IMAGE" 2>/dev/null || podman pull "$IMAGE"

            # 更新 .env 中的 IMAGE 变量
            mkdir -p "$DEPLOY_DIR"
            if [ -f "$DEPLOY_DIR/.env" ]; then
              sed -i "s|^IMAGE=.*|IMAGE=$IMAGE|" "$DEPLOY_DIR/.env"
            else
              echo "IMAGE=$IMAGE" > "$DEPLOY_DIR/.env"
              echo "CONFIG_DIR=$CONFIG_DIR" >> "$DEPLOY_DIR/.env"
              echo "SCHEDULE_INTERVAL=3600" >> "$DEPLOY_DIR/.env"
            fi

            # 拷贝 compose 文件（如果不存在）
            if [ ! -f "$DEPLOY_DIR/compose.yml" ]; then
              echo "[deploy] ERROR: $DEPLOY_DIR/compose.yml not found. Please set up the deploy directory first."
              exit 1
            fi

            # 重启容器
            cd "$DEPLOY_DIR"
            docker compose -f compose.yml -f compose.production.yml up -d 2>/dev/null \
              || podman compose -f compose.yml -f compose.production.yml up -d

            # 清理旧镜像
            docker image prune -f 2>/dev/null || podman image prune -f 2>/dev/null || true

            echo "[deploy] Deployment complete: $IMAGE"
